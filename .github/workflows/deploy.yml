name: Deploy

on:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r scripts/requirements.txt
      - run: python scripts/validate_projects.py
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
        working-directory: sites
      - run: npm run build
        working-directory: sites
        env:
          SITE_TARGET: cloudflare
      - run: npm run build
        working-directory: sites
        env:
          SITE_TARGET: github

  # Registers each project's subdomain as a Cloudflare Pages custom domain
  # (idempotent — skips ones that already exist). Previously this was a
  # manual, easy-to-forget step run locally by whoever set up a new project;
  # wiring it into CI means a new project's subdomain goes live on the same
  # push that adds it to projects.json, no manual follow-up required.
  cf-subdomains:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r scripts/requirements.txt
      - run: python scripts/cf_create_subdomain.py
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_PAGES_PROJECT: ${{ secrets.CLOUDFLARE_PAGES_PROJECT }}

  blogger-publish:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r scripts/requirements.txt
      - run: python scripts/blogger_publish.py
        env:
          BLOGGER_BLOG_ID: ${{ secrets.BLOGGER_BLOG_ID }}
          BLOGGER_OAUTH_CLIENT_ID: ${{ secrets.BLOGGER_OAUTH_CLIENT_ID }}
          BLOGGER_OAUTH_CLIENT_SECRET: ${{ secrets.BLOGGER_OAUTH_CLIENT_SECRET }}
          BLOGGER_REFRESH_TOKEN: ${{ secrets.BLOGGER_REFRESH_TOKEN }}
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update blogger_published.json"
          file_pattern: data/blogger_published.json

  # needs: blogger-publish (not parallel with it) so the two jobs don't both
  # try to git-commit-and-push data/*_published.json to `main` at the same
  # time — the second push loses the race with a non-fast-forward rejection.
  # `ref: main` on checkout picks up blogger-publish's commit (if any)
  # before this job makes its own. `if: always()` keeps this job unblocked
  # even if blogger-publish itself failed.
  tumblr-publish:
    needs: [validate, blogger-publish]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r scripts/requirements.txt
      - run: python scripts/tumblr_publish.py
        env:
          TUMBLR_BLOG_IDENTIFIER: ${{ secrets.TUMBLR_BLOG_IDENTIFIER }}
          TUMBLR_CONSUMER_KEY: ${{ secrets.TUMBLR_CONSUMER_KEY }}
          TUMBLR_CONSUMER_SECRET: ${{ secrets.TUMBLR_CONSUMER_SECRET }}
          TUMBLR_OAUTH_TOKEN: ${{ secrets.TUMBLR_OAUTH_TOKEN }}
          TUMBLR_OAUTH_TOKEN_SECRET: ${{ secrets.TUMBLR_OAUTH_TOKEN_SECRET }}
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update tumblr_published.json"
          file_pattern: data/tumblr_published.json

  # Runs after blogger-publish and tumblr-publish (not in parallel with
  # them) and re-checks out `main` instead of the triggering commit, so that
  # if either job just committed a new data/*_published.json (e.g. a post
  # published for the first time), this build already sees that URL and the
  # link wheel includes it on the very first deploy instead of only from the
  # next push onwards. `if: always()` keeps deploys unblocked even if
  # blogger-publish/tumblr-publish itself failed (e.g. a transient API
  # error) — the static sites must not depend on either platform being
  # reachable.
  deploy-cloudflare:
    needs: [blogger-publish, tumblr-publish]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
        working-directory: sites
      - run: npm run build
        working-directory: sites
        env:
          SITE_TARGET: cloudflare
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
      - uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: ${{ secrets.CLOUDFLARE_PAGES_PROJECT }}
          workingDirectory: sites
          directory: dist

  deploy-github:
    needs: [blogger-publish, tumblr-publish]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
        working-directory: sites
      - run: npm run build
        working-directory: sites
        env:
          SITE_TARGET: github
      - run: echo "gh.easyleads.es" > sites/dist/CNAME
      - uses: actions/upload-pages-artifact@v3
        with:
          path: sites/dist
      - uses: actions/deploy-pages@v4

  submit-indexnow:
    needs: [deploy-cloudflare, deploy-github, blogger-publish, tumblr-publish]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r scripts/requirements.txt
      - run: |
          # Built from projects.json instead of a hardcoded list — a
          # hardcoded list silently stops pinging new subdomains the moment
          # someone adds a project and forgets to update this step.
          urls=$(python -c "
          import json
          projects = json.load(open('sites/src/data/projects.json'))
          urls = ['https://easyleads.es/', 'https://gh.easyleads.es/']
          urls += [f'https://{p[\"subdomain\"]}/' for p in projects]
          print(' '.join(urls))
          ")
          python scripts/submit_indexnow.py $urls
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
